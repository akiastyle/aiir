<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{TITLE}}</title>
    <link rel="stylesheet" href="./ui.css" />
  </head>
  <body>
    <main class="app container">
      <header class="topbar navbar card paper">
        <h1>{{TITLE}}</h1>
        <span class="badge chip">preset: {{PRESET}}</span>
      </header>
      <section class="grid-2 row">
        <article class="card paper col">
          <h2>Primary Action</h2>
          <p>Starter block generated by AIIR UI preset.</p>
          <div class="row">
            <button class="btn btn-primary">Confirm</button>
            <button class="btn btn-muted btn-ghost btn-secondary">Cancel</button>
          </div>
        </article>
        <article class="card paper col">
          <h2>Form Sample</h2>
          <label class="label" for="name">Name</label>
          <input class="input" id="name" placeholder="Project value" />
        </article>
      </section>
    </main>
  </body>
</html>
